name: Build Plugins

on:
  push:
    branches: [master, main]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin' }
      - uses: gradle/actions/setup-gradle@v4

      - run: ./gradlew :vixsrc-plugin:assembleDebug :onlineserietv-plugin:assembleDebug :guardaserie-plugin:assembleDebug

      - name: Package
        run: |
          mkdir -p builds
          F=$(find vixsrc-plugin/build/outputs/apk/debug/ -name "*.apk" | head -1)
          cp "$F" builds/vixsrc-v${{ github.run_number }}.emuplugin
          echo "V=vixsrc-v${{ github.run_number }}.emuplugin" >> $GITHUB_ENV
          F=$(find onlineserietv-plugin/build/outputs/apk/debug/ -name "*.apk" | head -1)
          cp "$F" builds/onlineserietv-v${{ github.run_number }}.emuplugin
          echo "O=onlineserietv-v${{ github.run_number }}.emuplugin" >> $GITHUB_ENV
          F=$(find guardaserie-plugin/build/outputs/apk/debug/ -name "*.apk" | head -1)
          cp "$F" builds/guardaserie-v${{ github.run_number }}.emuplugin
          echo "G=guardaserie-v${{ github.run_number }}.emuplugin" >> $GITHUB_ENV

      - name: Generate repo.json
        run: |
          cat > builds/repo.json << EOF
          {
            "name": "Emusite Plugins",
            "description": "Repository ufficiale plugin Emusite",
            "url": "https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/builds/repo.json",
            "plugins": [
              {"name":"VixSrc","version":"1.0.${{ github.run_number }}","internalName":"vixsrc","description":"Film e Serie TV via TMDB + VixSrc","iconUrl":null,"url":"https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/builds/${{ env.V }}"},
              {"name":"OnlineSerieTV","version":"1.0.${{ github.run_number }}","internalName":"onlineserietv","description":"Film e Serie TV in italiano da OnlineSerieTV","iconUrl":null,"url":"https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/builds/${{ env.O }}"},
              {"name":"GuardaSerie","version":"1.0.${{ github.run_number }}","internalName":"guardaserie","description":"Serie TV italiane da GuardaSerie con streaming VixSrc","iconUrl":null,"url":"https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/builds/${{ env.G }}"}
            ]
          }
          EOF

      - name: Deploy
        if: github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: builds
          publish_dir: builds
          force_orphan: true
